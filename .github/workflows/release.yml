name: Release Build

on:
  release:
    types: [created, published]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Setup CMake
      uses: lukka/get-cmake@latest
      
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64
        
    - name: Build Project
      run: |
        cd build
        cmake --build . --config Release
        
    - name: Create Release Package
      run: |
        mkdir release-package
        copy build\Release\swiper.exe release-package\
        copy build\Release\capture.dll release-package\
        
    - name: Create ZIP Archive
      run: |
        cd release-package
        powershell Compress-Archive -Path * -DestinationPath ../swiper-windows.zip
        
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: swiper-windows.zip
